services:
  api:
    image: ${ECR_IMAGE:-the-farmers-market/api:latest}
    container_name: fm-api
    restart: unless-stopped
    ports:
      - "80:8080"
    environment:
      QUARKUS_PROFILE: prod
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://${DB_HOST}:5432/farmers_market
      QUARKUS_DATASOURCE_USERNAME: ${DB_USERNAME:-postgres}
      QUARKUS_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      QUARKUS_LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/q/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
